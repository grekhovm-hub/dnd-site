<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Airship Scene</title>

<style>
body { margin:0; overflow:hidden; background:black; }

/* КНОПКА */
#ui {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

#addToken {
  font-size: 24px;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">
  <button id="addToken">+</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// =====================
// СЦЕНА
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

// =====================
// КАМЕРА
// =====================
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 15, 20);

// =====================
// РЕНДЕР
// =====================
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// УПРАВЛЕНИЕ
// =====================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0,0,0);
controls.update();

// =====================
// СВЕТ
// =====================
scene.add(new THREE.AmbientLight(0x404040));

const light = new THREE.DirectionalLight(0x99ccff, 1);
light.position.set(10,20,10);
scene.add(light);

// =====================
// КОРАБЛЬ (УЛУЧШЕННЫЙ)
// =====================
const ship = new THREE.Group();

// палуба
const deck = new THREE.Mesh(
  new THREE.BoxGeometry(10,1,20),
  new THREE.MeshStandardMaterial({ color:0x5a3e2b })
);
ship.add(deck);

// нос (сужение)
const nose = new THREE.Mesh(
  new THREE.ConeGeometry(5,6,4),
  new THREE.MeshStandardMaterial({ color:0x5a3e2b })
);
nose.rotation.y = Math.PI/4;
nose.position.z = -13;
ship.add(nose);

// борта
function createRail(x){
  const rail = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,1,20),
    new THREE.MeshStandardMaterial({ color:0x3a2a1a })
  );
  rail.position.x = x;
  rail.position.y = 1;
  ship.add(rail);
}

createRail(5);
createRail(-5);

scene.add(ship);

// =====================
// СЕТКА
// =====================
const gridCells = [];
const size = 10;

for(let x=0;x<size;x++){
  for(let z=0;z<size;z++){

    const cell = new THREE.Mesh(
      new THREE.PlaneGeometry(1,1),
    new THREE.MeshBasicMaterial({
  color: 0x00ff88,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide
})
    );

    cell.rotation.x = -Math.PI/2;
    cell.position.set((x-size/2)+0.5,0.51,(z-size/2)+0.5);

    const dx = cell.position.x/5;
    const dz = cell.position.z/10;

    if(dx*dx + dz*dz > 1) continue;

    scene.add(cell);
    gridCells.push(cell);
  }
}

// =====================
// ФИШКИ
// =====================
const tokens = [];
const tokenMeshes = [];
let selected = null;

  function snapToGrid(x, z) {
  const size = 10;

  let snappedX = Math.round(x - 0.5) + 0.5;
  let snappedZ = Math.round(z - 0.5) + 0.5;

  return { x: snappedX, z: snappedZ };
}
  
// создание пешки
function createToken(x,z){

  const group = new THREE.Group();

  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4,0.5,0.2,16),
    new THREE.MeshStandardMaterial({ color:0xdddddd })
  );

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2,0.3,0.6,16),
    new THREE.MeshStandardMaterial({ color:0xffffff })
  );
  body.position.y = 0.4;

  const head = new THREE.Mesh(
   new THREE.SphereGeometry(1,16,16),
    new THREE.MeshStandardMaterial({ color:0xffffff })
  );
  head.position.y = 0.8;

  group.add(base, body, head);
  const hitbox = new THREE.Mesh(
  new THREE.CylinderGeometry(0.6, 0.6, 2, 8),
  new THREE.MeshBasicMaterial({ visible: false })
);

hitbox.position.y = 0.8;

group.add(hitbox);
tokenMeshes.push(hitbox);

  group.position.set(x,1,z);

  scene.add(group);
  tokens.push(group);
}

// =====================
// ДОБАВЛЕНИЕ ФИШКИ
// =====================
document.getElementById("addToken").onclick = () => {

  const cell = gridCells[Math.floor(Math.random()*gridCells.length)];
  createToken(cell.position.x, cell.position.z);
};

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("mouseup", (e)=>{

  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;

  raycaster.setFromCamera(mouse, camera);

// 1. Клик по фишке
const tokenHits = raycaster.intersectObjects(tokenMeshes, true);

console.log("tokenHits:", tokenHits.length);

  if(tokenHits.length > 0){

  let obj = tokenHits[0].object;

  while(obj.parent && !tokens.includes(obj)){
    obj = obj.parent;
  }

  selected = obj;

  controls.enabled = false; // 👈 ВАЖНО
  return;
}

  // 2. Если фишка выбрана — ставим
  if(selected){

    const gridHits = raycaster.intersectObjects(gridCells);

    if(gridHits.length > 0){

      const pos = gridHits[0].object.position;
      const snapped = snapToGrid(pos.x, pos.z);

      selected.position.x = snapped.x;
      selected.position.z = snapped.z;

      selected = null;
controls.enabled = true;
    }
  }

});

// =====================
// ОБЛАКА (ОБЪЕМНЫЕ)
// =====================
const clouds = [];

for(let i=0;i<20;i++){
  const cloud = new THREE.Group();

  for(let j=0;j<5;j++){
    const part = new THREE.Mesh(
      new THREE.SphereGeometry(Math.random()*2,8,8),
      new THREE.MeshStandardMaterial({
        color:0xffffff,
        transparent:true,
        opacity:0.1
      })
    );

    part.position.set(
      Math.random()*4,
      Math.random()*2,
      Math.random()*4
    );

    cloud.add(part);
  }

  cloud.position.set(
    (Math.random()-0.5)*50,
    Math.random()*5,
    (Math.random()-0.5)*50
  );

  scene.add(cloud);
  clouds.push(cloud);
}

// =====================
// АНИМАЦИЯ
// =====================
function animate(){
  requestAnimationFrame(animate);

clouds.forEach(c=>{
  c.position.z += 0.03;
  if(c.position.z > 25) c.position.z = -25;
});

  renderer.render(scene,camera);
}
animate();

// resize
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
