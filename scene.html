<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Airship Scene</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#ui {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

#addToken {
  font-size: 24px;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">
  <button id="addToken">+</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// =====================
// СЦЕНА
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

const LAYER_DEFAULT = 0;
const LAYER_TOKEN = 1;
const LAYER_GRID = 2;

function setLayerRecursive(obj, layer) {
  obj.layers.set(layer);
  obj.traverse(child => child.layers.set(layer));
}

// =====================
// КАМЕРА
// =====================
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 15, 20);

// =====================
// РЕНДЕР
// =====================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// УПРАВЛЕНИЕ
// =====================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

controls.mouseButtons = {
  LEFT: null,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE
};

// =====================
// СВЕТ
// =====================
scene.add(new THREE.AmbientLight(0x404040));

const light = new THREE.DirectionalLight(0x99ccff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// =====================
// КОРАБЛЬ
// =====================
const ship = new THREE.Group();

// палуба
const deck = new THREE.Mesh(
  new THREE.BoxGeometry(10, 1, 20),
  new THREE.MeshStandardMaterial({ color: 0x5a3e2b })
);
ship.add(deck);

// нос
const nose = new THREE.Mesh(
  new THREE.ConeGeometry(5, 6, 4),
  new THREE.MeshStandardMaterial({ color: 0x5a3e2b })
);
nose.rotation.y = Math.PI / 4;
nose.position.z = -13;
ship.add(nose);

// борта
function createRail(x) {
  const rail = new THREE.Mesh(
    new THREE.BoxGeometry(0.3, 1, 20),
    new THREE.MeshStandardMaterial({ color: 0x3a2a1a })
  );
  rail.position.x = x;
  rail.position.y = 1;
  ship.add(rail);
}

createRail(5);
createRail(-5);

scene.add(ship);

// =====================
// СЕТКА
// =====================
const gridCells = [];
const size = 10;

for (let x = 0; x < size; x++) {
  for (let z = 0; z < size; z++) {
    const cell = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        color: 0x00ff88,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide
      })
    );

    cell.rotation.x = -Math.PI / 2;
    cell.position.set((x - size / 2) + 0.5, 0.51, (z - size / 2) + 0.5);

    const dx = cell.position.x / 5;
    const dz = cell.position.z / 10;

    if (dx * dx + dz * dz > 1) continue;

cell.layers.set(LAYER_GRID);
scene.add(cell);
gridCells.push(cell);
  }
}

// =====================
// ФИШКИ
// =====================
const tokens = [];
let selected = null;

function isCellOccupied(cell, ignoreToken = null) {
  return tokens.some(token =>
    token !== ignoreToken &&
    Math.abs(token.position.x - cell.position.x) < 0.01 &&
    Math.abs(token.position.z - cell.position.z) < 0.01
  );
}

function updateMouseAndRay(event) {
  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
}

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

function setTokenSelected(token, isSelected) {
  token.traverse((child) => {
    if (child.isMesh && child.material && child.material.emissive) {
      child.material.emissive.setHex(isSelected ? 0x333333 : 0x000000);
    }
  });
}

// создание фишки
function createToken(x, z) {
  const group = new THREE.Group();
  group.userData.isToken = true;

  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.5, 0.2, 16),
    new THREE.MeshStandardMaterial({ color: 0xdddddd })
  );

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 0.6, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  body.position.y = 0.4;

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  head.position.y = 0.8;

  group.add(base, body, head);
group.position.set(x, 0.51, z);

setLayerRecursive(group, LAYER_TOKEN);

scene.add(group);
tokens.push(group);

group.updateMatrixWorld(true);
}

// =====================
// ДОБАВЛЕНИЕ ФИШКИ
// =====================
document.getElementById("addToken").onclick = () => {
  const freeCells = gridCells.filter(cell => !isCellOccupied(cell));

  if (freeCells.length === 0) return;

  const cell = freeCells[Math.floor(Math.random() * freeCells.length)];
  createToken(cell.position.x, cell.position.z);
};

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

renderer.domElement.addEventListener("pointermove", (e) => {
  if (!selected) return;

  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

  selected.position.x = cell.position.x;
  selected.position.z = cell.position.z;
});

renderer.domElement.addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return;

  e.preventDefault();
  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  // 1. Выбор фишки
  if (!selected) {
    raycaster.layers.set(LAYER_TOKEN);
    const tokenHits = raycaster.intersectObjects(tokens, true);

    console.log("tokenHits:", tokenHits.length, tokenHits[0]?.object);

    if (tokenHits.length > 0) {
      const token = getTokenRoot(tokenHits[0].object);

      if (token) {
        selected = token;
        setTokenSelected(selected, true);
        selected.position.y = 0.7; // чуть приподнимаем для наглядности
        controls.enabled = false;
      }
    }

    return;
  }

  // 2. Постановка на клетку
  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  console.log("gridHits:", gridHits.length, gridHits[0]?.object);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

  selected.position.x = cell.position.x;
  selected.position.y = 0.51;
  selected.position.z = cell.position.z;

  setTokenSelected(selected, false);
  selected = null;
  controls.enabled = true;
});

// =====================
// АНИМАЦИЯ
// =====================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// =====================
// RESIZE
// =====================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
