<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Airship Scene</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#ui {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

#addToken {
  font-size: 24px;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">
  <button id="addToken">+</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// =====================
// СЦЕНА
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

const LAYER_DEFAULT = 0;
const LAYER_TOKEN = 1;
const LAYER_GRID = 2;

function enableLayerRecursive(obj, layer) {
  obj.layers.enable(layer);
  obj.traverse(child => child.layers.enable(layer));
}

// =====================
// КАМЕРА
// =====================
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 15, 20);

// =====================
// РЕНДЕР
// =====================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// УПРАВЛЕНИЕ
// =====================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

controls.mouseButtons = {
  LEFT: null,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE
};

// =====================
// СВЕТ
// =====================
scene.add(new THREE.AmbientLight(0x404040));

const light = new THREE.DirectionalLight(0x99ccff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// =====================
// КОРАБЛЬ
// =====================
const ship = new THREE.Group();

// палуба
const deck = new THREE.Mesh(
  new THREE.BoxGeometry(10, 1, 20),
  new THREE.MeshStandardMaterial({ color: 0x5a3e2b })
);
ship.add(deck);

// нос
const nose = new THREE.Mesh(
  new THREE.ConeGeometry(5, 6, 4),
  new THREE.MeshStandardMaterial({ color: 0x5a3e2b })
);
nose.rotation.y = Math.PI / 4;
nose.position.z = -13;
ship.add(nose);

// борта
function createRail(x) {
  const rail = new THREE.Mesh(
    new THREE.BoxGeometry(0.3, 1, 20),
    new THREE.MeshStandardMaterial({ color: 0x3a2a1a })
  );
  rail.position.x = x;
  rail.position.y = 1;
  ship.add(rail);
}

createRail(5);
createRail(-5);

scene.add(ship);

// =====================
// ОБЛАКА И ВЕТЕР
// =====================
const clock = new THREE.Clock();

const cloudLayer = new THREE.Group();
const windLayer = new THREE.Group();
scene.add(cloudLayer);
scene.add(windLayer);

const clouds = [];
const windStreaks = [];

// мягкая текстура облака
function createCloudTexture() {
  const size = 128;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  const g = ctx.createRadialGradient(
    size / 2, size / 2, 10,
    size / 2, size / 2, size / 2
  );

  g.addColorStop(0.0, "rgba(255,255,255,0.95)");
  g.addColorStop(0.35, "rgba(255,255,255,0.65)");
  g.addColorStop(0.7, "rgba(220,235,255,0.25)");
  g.addColorStop(1.0, "rgba(255,255,255,0.0)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);

  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

// текстура полосы ветра
function createWindTexture() {
  const w = 128;
  const h = 32;
  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d");
  const g = ctx.createLinearGradient(0, 0, w, 0);

  g.addColorStop(0.0, "rgba(255,255,255,0.0)");
  g.addColorStop(0.5, "rgba(255,255,255,0.9)");
  g.addColorStop(1.0, "rgba(255,255,255,0.0)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

const cloudTexture = createCloudTexture();
const windTexture = createWindTexture();

function resetCloud(cloud, spawnAhead = false) {
  cloud.position.x = THREE.MathUtils.randFloatSpread(30);
  cloud.position.y = THREE.MathUtils.randFloat(5, 14);
  cloud.position.z = spawnAhead
    ? THREE.MathUtils.randFloat(-140, -70)
    : THREE.MathUtils.randFloat(-120, 80);

  cloud.userData.speed = THREE.MathUtils.randFloat(0.03, 0.08);
  cloud.userData.spin = THREE.MathUtils.randFloat(-0.0015, 0.0015);
}

function createCloud() {
  const group = new THREE.Group();

  const puffCount = THREE.MathUtils.randInt(5, 9);

  for (let i = 0; i < puffCount; i++) {
    const material = new THREE.SpriteMaterial({
      map: cloudTexture,
      transparent: true,
      opacity: THREE.MathUtils.randFloat(0.18, 0.42),
      depthWrite: false
    });

    const sprite = new THREE.Sprite(material);

    const s = THREE.MathUtils.randFloat(4, 8);
    sprite.scale.set(s, s * 0.65, 1);

    sprite.position.set(
      THREE.MathUtils.randFloatSpread(6),
      THREE.MathUtils.randFloat(-1.2, 1.2),
      THREE.MathUtils.randFloatSpread(4)
    );

    group.add(sprite);
  }

  resetCloud(group, false);
  cloudLayer.add(group);
  clouds.push(group);
}

function resetWindStreak(streak, spawnAhead = false) {
  streak.position.x = THREE.MathUtils.randFloatSpread(18);
  streak.position.y = THREE.MathUtils.randFloat(1.5, 9);
  streak.position.z = spawnAhead
    ? THREE.MathUtils.randFloat(-35, -10)
    : THREE.MathUtils.randFloat(-30, 25);

  const len = THREE.MathUtils.randFloat(1.2, 3.5);
  streak.scale.set(len, 0.08, 1);

  streak.material.opacity = THREE.MathUtils.randFloat(0.08, 0.22);
  streak.userData.speed = THREE.MathUtils.randFloat(0.35, 0.9);
}

function createWindStreak() {
  const material = new THREE.SpriteMaterial({
    map: windTexture,
    transparent: true,
    opacity: 0.15,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const streak = new THREE.Sprite(material);
  resetWindStreak(streak, false);

  windLayer.add(streak);
  windStreaks.push(streak);
}

// создаем облака
for (let i = 0; i < 24; i++) {
  createCloud();
}

// создаем полосы ветра
for (let i = 0; i < 45; i++) {
  createWindStreak();
}
  
// =====================
// СЕТКА
// =====================
const gridCells = [];
const size = 10;

for (let x = 0; x < size; x++) {
  for (let z = 0; z < size; z++) {
    const cell = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        color: 0x00ff88,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide
      })
    );

    cell.rotation.x = -Math.PI / 2;
    cell.position.set((x - size / 2) + 0.5, 0.51, (z - size / 2) + 0.5);

    const dx = cell.position.x / 5;
    const dz = cell.position.z / 10;

    if (dx * dx + dz * dz > 1) continue;

cell.layers.enable(LAYER_GRID);
scene.add(cell);
gridCells.push(cell);
  }
}

// =====================
// ФИШКИ
// =====================
const tokens = [];
let selected = null;

function isCellOccupied(cell, ignoreToken = null) {
  return tokens.some(token =>
    token !== ignoreToken &&
    Math.abs(token.position.x - cell.position.x) < 0.01 &&
    Math.abs(token.position.z - cell.position.z) < 0.01
  );
}

function updateMouseAndRay(event) {
  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
}

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

function setTokenSelected(token, isSelected) {
  token.traverse((child) => {
    if (child.isMesh && child.material && child.material.emissive) {
      child.material.emissive.setHex(isSelected ? 0x333333 : 0x000000);
    }
  });
}

// создание фишки
function createToken(x, z) {
  const group = new THREE.Group();
  group.userData.isToken = true;

  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.5, 0.2, 16),
    new THREE.MeshStandardMaterial({ color: 0xdddddd })
  );

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 0.6, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  body.position.y = 0.4;

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  head.position.y = 0.8;

  group.add(base, body, head);
group.position.set(x, 0.51, z);

enableLayerRecursive(group, LAYER_TOKEN);

scene.add(group);
tokens.push(group);

group.updateMatrixWorld(true);
}

// =====================
// ДОБАВЛЕНИЕ ФИШКИ
// =====================
document.getElementById("addToken").onclick = () => {
  const freeCells = gridCells.filter(cell => !isCellOccupied(cell));

  if (freeCells.length === 0) return;

  const cell = freeCells[Math.floor(Math.random() * freeCells.length)];
  createToken(cell.position.x, cell.position.z);
};

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

renderer.domElement.addEventListener("pointermove", (e) => {
  if (!selected) return;

  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

  selected.position.x = cell.position.x;
  selected.position.z = cell.position.z;
});

renderer.domElement.addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return;

  e.preventDefault();
  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  // 1. Выбор фишки
  if (!selected) {
    raycaster.layers.set(LAYER_TOKEN);
    const tokenHits = raycaster.intersectObjects(tokens, true);

    console.log("tokenHits:", tokenHits.length, tokenHits[0]?.object);

    if (tokenHits.length > 0) {
      const token = getTokenRoot(tokenHits[0].object);

      if (token) {
        selected = token;
        setTokenSelected(selected, true);
        selected.position.y = 0.7; // чуть приподнимаем для наглядности
        controls.enabled = false;
      }
    }

    return;
  }

  // 2. Постановка на клетку
  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  console.log("gridHits:", gridHits.length, gridHits[0]?.object);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

  selected.position.x = cell.position.x;
  selected.position.y = 0.51;
  selected.position.z = cell.position.z;

  setTokenSelected(selected, false);
  selected = null;
  controls.enabled = true;
});

// =====================
// АНИМАЦИЯ
// =====================
function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // движение облаков:
  // корабль как будто летит вперед (в сторону -Z),
  // поэтому облака медленно уходят назад (+Z)
  for (const cloud of clouds) {
    cloud.position.z += cloud.userData.speed;
    cloud.rotation.y += cloud.userData.spin;

    if (cloud.position.z > 90) {
      resetCloud(cloud, true);
    }
  }

  // ветер летит быстрее облаков
  for (const streak of windStreaks) {
    streak.position.z += streak.userData.speed;

    if (streak.position.z > 30) {
      resetWindStreak(streak, true);
    }
  }

  // легкая качка корабля
  ship.rotation.z = Math.sin(t * 0.9) * 0.018;
  ship.rotation.x = Math.sin(t * 0.6) * 0.01;
  ship.position.y = Math.sin(t * 1.2) * 0.12;

  renderer.render(scene, camera);
}
animate();

// =====================
// RESIZE
// =====================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
