<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Airship Scene</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#ui {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

#addToken {
  font-size: 24px;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">
  <button id="addToken">+</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>

<script>
// =====================
// СЦЕНА
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

const LAYER_DEFAULT = 0;
const LAYER_TOKEN = 1;
const LAYER_GRID = 2;
const GRID_STEP = 2;
const GRID_SURFACE_OFFSET = 0.03;
const GRID_NORMAL_THRESHOLD = 0.72;
const GRID_LEVEL_EPSILON = 0.12;
const TOKEN_Y_OFFSET = 0.105;  

function enableLayerRecursive(obj, layer) {
  obj.layers.enable(layer);
  obj.traverse(child => child.layers.enable(layer));
}

// =====================
// КАМЕРА
// =====================
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 15, 20);

// =====================
// РЕНДЕР
// =====================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// УПРАВЛЕНИЕ
// =====================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

controls.mouseButtons = {
  LEFT: null,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE
};

// =====================
// СВЕТ
// =====================
scene.add(new THREE.AmbientLight(0x404040));

const light = new THREE.DirectionalLight(0x99ccff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// =====================
// КОРАБЛЬ
// =====================
// =====================
// КОРАБЛЬ ИЗ STL
// =====================
const ship = new THREE.Group();
let shipMesh = null;
scene.add(ship);

const shipMaterial = new THREE.MeshStandardMaterial({
  color: 0x6b4328,
  roughness: 0.88,
  metalness: 0.08
});

const stlLoader = new THREE.STLLoader();

stlLoader.load(
  "Simple_Airship.stl",
  (geometry) => {
    geometry.computeVertexNormals();
    geometry.center();

    const mesh = new THREE.Mesh(geometry, shipMaterial);

    // STL от моделей для печати обычно не в той ориентации,
    // которая нужна сцене Three.js
    mesh.rotation.x = -Math.PI / 2;
    mesh.rotation.z =  Math.PI / 2;

    ship.add(mesh);

    // Подгоняем размер под твою сцену
    const box = new THREE.Box3().setFromObject(mesh);
    const size = new THREE.Vector3();
    box.getSize(size);

    const currentLength = Math.max(size.x, size.z);
    const targetLength = 26; // длина корабля в твоей сцене
    const scale = targetLength / currentLength;

    mesh.scale.setScalar(scale);

    // После масштабирования пересчитываем bbox
    const box2 = new THREE.Box3().setFromObject(mesh);
    const center = new THREE.Vector3();
    box2.getCenter(center);

    // Центруем модель в сцене
    mesh.position.x -= center.x;
    mesh.position.z -= center.z;

    // Ставим ее примерно на уровень палубы/поля
    mesh.position.y -= box2.min.y;
    mesh.position.y -= 0.35;
    shipMesh = mesh;
scene.updateMatrixWorld(true);

requestAnimationFrame(() => {
  rebuildGridFromShip(shipMesh);
});
scene.updateMatrixWorld(true);
rebuildGridFromShip(shipMesh);

    // Если корабль окажется развернут задом наперед —
    // просто раскомментируй следующую строку:
    // mesh.rotation.y += Math.PI;
  },
  undefined,
  (error) => {
    console.error("Ошибка загрузки STL:", error);
  }
);

// =====================
// ОБЛАКА И ВЕТЕР
// =====================
const clock = new THREE.Clock();

const cloudLayer = new THREE.Group();
const windLayer = new THREE.Group();
scene.add(cloudLayer);
scene.add(windLayer);

const clouds = [];
const windStreaks = [];

// мягкая текстура облака
function createCloudTexture() {
  const size = 128;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  const g = ctx.createRadialGradient(
    size / 2, size / 2, 10,
    size / 2, size / 2, size / 2
  );

  g.addColorStop(0.0, "rgba(255,255,255,0.95)");
  g.addColorStop(0.35, "rgba(255,255,255,0.65)");
  g.addColorStop(0.7, "rgba(220,235,255,0.25)");
  g.addColorStop(1.0, "rgba(255,255,255,0.0)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);

  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

// текстура полосы ветра
function createWindTexture() {
  const w = 128;
  const h = 32;
  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d");
  const g = ctx.createLinearGradient(0, 0, w, 0);

  g.addColorStop(0.0, "rgba(255,255,255,0.0)");
  g.addColorStop(0.5, "rgba(255,255,255,0.9)");
  g.addColorStop(1.0, "rgba(255,255,255,0.0)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

const cloudTexture = createCloudTexture();
const windTexture = createWindTexture();

function resetCloud(cloud, spawnAhead = false) {
  cloud.position.x = THREE.MathUtils.randFloatSpread(30);
  cloud.position.y = THREE.MathUtils.randFloat(5, 14);
  cloud.position.z = spawnAhead
    ? THREE.MathUtils.randFloat(-140, -70)
    : THREE.MathUtils.randFloat(-120, 80);

  cloud.userData.speed = THREE.MathUtils.randFloat(0.03, 0.08);
  cloud.userData.spin = THREE.MathUtils.randFloat(-0.0015, 0.0015);
}

function createCloud() {
  const group = new THREE.Group();

  const puffCount = THREE.MathUtils.randInt(5, 9);

  for (let i = 0; i < puffCount; i++) {
    const material = new THREE.SpriteMaterial({
      map: cloudTexture,
      transparent: true,
      opacity: THREE.MathUtils.randFloat(0.18, 0.42),
      depthWrite: false
    });

    const sprite = new THREE.Sprite(material);

    const s = THREE.MathUtils.randFloat(4, 8);
    sprite.scale.set(s, s * 0.65, 1);

    sprite.position.set(
      THREE.MathUtils.randFloatSpread(6),
      THREE.MathUtils.randFloat(-1.2, 1.2),
      THREE.MathUtils.randFloatSpread(4)
    );

    group.add(sprite);
  }

  resetCloud(group, false);
  cloudLayer.add(group);
  clouds.push(group);
}

function resetWindStreak(streak, spawnAhead = false) {
  streak.position.x = THREE.MathUtils.randFloatSpread(18);
  streak.position.y = THREE.MathUtils.randFloat(1.5, 9);
  streak.position.z = spawnAhead
    ? THREE.MathUtils.randFloat(-35, -10)
    : THREE.MathUtils.randFloat(-30, 25);

  const len = THREE.MathUtils.randFloat(1.2, 3.5);
  streak.scale.set(len, 0.08, 1);

  streak.material.opacity = THREE.MathUtils.randFloat(0.08, 0.22);
  streak.userData.speed = THREE.MathUtils.randFloat(0.35, 0.9);
}

function createWindStreak() {
  const material = new THREE.SpriteMaterial({
    map: windTexture,
    transparent: true,
    opacity: 0.15,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const streak = new THREE.Sprite(material);
  resetWindStreak(streak, false);

  windLayer.add(streak);
  windStreaks.push(streak);
}

// создаем облака
for (let i = 0; i < 24; i++) {
  createCloud();
}

// создаем полосы ветра
for (let i = 0; i < 45; i++) {
  createWindStreak();
}
  
// =====================
// СЕТКА ПО STL-МОДЕЛИ
// =====================
const gridCells = [];

function clearGrid() {
  for (const cell of gridCells) {
    if (cell.userData.group) {
      scene.remove(cell.userData.group);
    } else {
      scene.remove(cell);
    }
  }
  gridCells.length = 0;
}

function createGridCell(x, surfaceY, z) {
  const group = new THREE.Group();
  group.position.set(x, surfaceY + GRID_SURFACE_OFFSET, z);

  const fill = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({
      color: 0x00ff88,
      transparent: true,
      opacity: 0.10,
      side: THREE.DoubleSide,
      polygonOffset: true,
      polygonOffsetFactor: -1,
      polygonOffsetUnits: -2
    })
  );
  fill.rotation.x = -Math.PI / 2;
  fill.layers.enable(LAYER_GRID);

  const borderGeometry = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.5, 0, -0.5),
    new THREE.Vector3( 0.5, 0, -0.5),
    new THREE.Vector3( 0.5, 0,  0.5),
    new THREE.Vector3(-0.5, 0,  0.5)
  ]);

  const border = new THREE.LineLoop(
    borderGeometry,
    new THREE.LineBasicMaterial({
      color: 0x000000,
      transparent: true,
      opacity: 0.75
    })
  );
  border.position.y = 0.002;

  group.add(fill);
  group.add(border);
  scene.add(group);

  fill.position.set(0, 0, 0);
  fill.userData.group = group;
  fill.userData.surfaceY = surfaceY;
  fill.userData.tokenY = surfaceY + TOKEN_Y_OFFSET;

  gridCells.push(fill);
}

function rebuildGridFromShip(mesh) {
  if (!mesh) return;

  clearGrid();
  scene.updateMatrixWorld(true);

  const box = new THREE.Box3().setFromObject(mesh);

  const minX = Math.floor(box.min.x) - 1;
  const maxX = Math.ceil(box.max.x) + 1;
  const minZ = Math.floor(box.min.z) - 1;
  const maxZ = Math.ceil(box.max.z) + 1;
  const rayStartY = box.max.y + 10;

  const rc = new THREE.Raycaster();
  const down = new THREE.Vector3(0, -1, 0);
  const normalMatrix = new THREE.Matrix3();

  const xValues = [];
  const zValues = [];

  for (let x = minX + 0.5; x <= maxX - 0.5; x += GRID_STEP) {
    xValues.push(x);
  }

  for (let z = minZ + 0.5; z <= maxZ - 0.5; z += GRID_STEP) {
    zValues.push(z);
  }

  let xi = 0;

  function processChunk() {
    const startedAt = performance.now();

    while (xi < xValues.length && performance.now() - startedAt < 10) {
      const x = xValues[xi];

      for (const z of zValues) {
        rc.set(new THREE.Vector3(x, rayStartY, z), down);

        const hits = rc.intersectObject(mesh, true);
        if (hits.length === 0) continue;

        const acceptedLevels = [];

        for (const hit of hits) {
          if (!hit.face) continue;

          normalMatrix.getNormalMatrix(hit.object.matrixWorld);
          const worldNormal = hit.face.normal
            .clone()
            .applyNormalMatrix(normalMatrix)
            .normalize();

          if (worldNormal.y < GRID_NORMAL_THRESHOLD) continue;

          const y = hit.point.y;

          const alreadyExists = acceptedLevels.some(
            existingY => Math.abs(existingY - y) < GRID_LEVEL_EPSILON
          );
          if (alreadyExists) continue;

          acceptedLevels.push(y);
        }

        for (const levelY of acceptedLevels) {
          createGridCell(x, levelY, z);
        }
      }

      xi++;
    }

    if (xi < xValues.length) {
      requestAnimationFrame(processChunk);
    } else {
      console.log("grid cells:", gridCells.length);
    }
  }

  requestAnimationFrame(processChunk);
}

// =====================
// ФИШКИ
// =====================
const tokens = [];
let selected = null;

function isCellOccupied(cell, ignoreToken = null) {
  return tokens.some(token =>
    token !== ignoreToken &&
    Math.abs(token.position.x - cell.parent.position.x) < 0.01 &&
    Math.abs(token.position.z - cell.parent.position.z) < 0.01 &&
    Math.abs(token.position.y - cell.userData.tokenY) < 0.12
  );
}

function updateMouseAndRay(event) {
  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
}

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

function setTokenSelected(token, isSelected) {
  token.traverse((child) => {
    if (child.isMesh && child.material && child.material.emissive) {
      child.material.emissive.setHex(isSelected ? 0x333333 : 0x000000);
    }
  });
}

// создание фишки
function createToken(x, y, z) {
  const group = new THREE.Group();
  group.userData.isToken = true;

  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.5, 0.2, 16),
    new THREE.MeshStandardMaterial({ color: 0xdddddd })
  );

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 0.6, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  body.position.y = 0.4;

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  head.position.y = 0.8;

  group.add(base, body, head);
  group.position.set(x, y, z);

  enableLayerRecursive(group, LAYER_TOKEN);

  scene.add(group);
  tokens.push(group);

  group.updateMatrixWorld(true);
}

// =====================
// ДОБАВЛЕНИЕ ФИШКИ
// =====================
document.getElementById("addToken").onclick = () => {
  if (gridCells.length === 0) return;

  const freeCells = gridCells.filter(cell => !isCellOccupied(cell));
  if (freeCells.length === 0) return;

  const cell = freeCells[Math.floor(Math.random() * freeCells.length)];

  createToken(
    cell.parent.position.x,
    cell.userData.tokenY,
    cell.parent.position.z
  );
};

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener("pointermove", (e) => {
  if (!selected) return;

  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

selected.position.x = cell.parent.position.x;
selected.position.y = cell.userData.tokenY + 0.18;
selected.position.z = cell.parent.position.z;
});

renderer.domElement.addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return;

  e.preventDefault();
  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  // 1. Выбор фишки
  if (!selected) {
    raycaster.layers.set(LAYER_TOKEN);
    const tokenHits = raycaster.intersectObjects(tokens, true);

    console.log("tokenHits:", tokenHits.length, tokenHits[0]?.object);

    if (tokenHits.length > 0) {
      const token = getTokenRoot(tokenHits[0].object);

      if (token) {
        selected = token;
        setTokenSelected(selected, true);
        selected.position.y += 0.18; // чуть приподнимаем для наглядности
        controls.enabled = false;
      }
    }

    return;
  }

  // 2. Постановка на клетку
  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  console.log("gridHits:", gridHits.length, gridHits[0]?.object);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

selected.position.x = cell.parent.position.x;
selected.position.y = cell.userData.tokenY;
selected.position.z = cell.parent.position.z;

  setTokenSelected(selected, false);
  selected = null;
  controls.enabled = true;
});

// =====================
// АНИМАЦИЯ
// =====================
function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // движение облаков:
  // корабль как будто летит вперед (в сторону -Z),
  // поэтому облака медленно уходят назад (+Z)
  for (const cloud of clouds) {
    cloud.position.z += cloud.userData.speed;
    cloud.rotation.y += cloud.userData.spin;

    if (cloud.position.z > 90) {
      resetCloud(cloud, true);
    }
  }

  // ветер летит быстрее облаков
  for (const streak of windStreaks) {
    streak.position.z += streak.userData.speed;

    if (streak.position.z > 30) {
      resetWindStreak(streak, true);
    }
  }

  renderer.render(scene, camera);
}
animate();

// =====================
// RESIZE
// =====================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
