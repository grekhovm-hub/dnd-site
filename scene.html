<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Airship Scene</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
  </style>
</head>
<body>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';

// СЦЕНА
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

// КАМЕРА
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 15, 15);

// РЕНДЕР
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// КОНТРОЛЫ
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,0,0);
controls.update();

// СВЕТ
const light = new THREE.DirectionalLight(0x99ccff, 1);
light.position.set(10, 20, 10);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

// КОРАБЛЬ
const ship = new THREE.Mesh(
  new THREE.BoxGeometry(10, 1, 20),
  new THREE.MeshStandardMaterial({ color: 0x5a3e2b })
);
scene.add(ship);

// СЕТКА
const grid = new THREE.Group();
const size = 10;

for (let x = 0; x < size; x++) {
  for (let z = 0; z < size; z++) {

    const cell = new THREE.Mesh(
      new THREE.PlaneGeometry(1,1),
      new THREE.MeshBasicMaterial({
        color: 0x00ff88,
        transparent: true,
        opacity: 0.2,
        side: THREE.DoubleSide
      })
    );

    cell.rotation.x = -Math.PI / 2;

    cell.position.x = (x - size/2) + 0.5;
    cell.position.z = (z - size/2) + 0.5;
    cell.position.y = 0.51;

    // форма корабля (овал)
    const dx = cell.position.x / 5;
    const dz = cell.position.z / 10;

    if (dx*dx + dz*dz > 1) continue;

    grid.add(cell);
  }
}

scene.add(grid);

// КЛИКИ
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (event) => {

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObjects(grid.children);

  if (hits.length > 0) {
    hits[0].object.material.color.set(0xff0000);
  }
});

// ОБЛАКА
const clouds = [];

for (let i = 0; i < 20; i++) {
  const cloud = new THREE.Mesh(
    new THREE.PlaneGeometry(10,5),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.05
    })
  );

  cloud.position.set(
    (Math.random() - 0.5) * 50,
    Math.random() * 5,
    (Math.random() - 0.5) * 50
  );

  cloud.rotation.x = -Math.PI / 2;

  scene.add(cloud);
  clouds.push(cloud);
}

// АНИМАЦИЯ
function animate() {
  requestAnimationFrame(animate);

  clouds.forEach(c => {
    c.position.z += 0.05;
    if (c.position.z > 25) c.position.z = -25;
  });

  renderer.render(scene, camera);
}

animate();

// resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
