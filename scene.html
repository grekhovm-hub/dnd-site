<body>

  <button id="addToken">+</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// =====================
// СЦЕНА
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

const LAYER_DEFAULT = 0;
const LAYER_TOKEN = 1;
const LAYER_GRID = 2;

function enableLayerRecursive(obj, layer) {
  obj.layers.enable(layer);
  obj.traverse(child => child.layers.enable(layer));
}

// =====================
// КАМЕРА
// =====================
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 15, 20);

// =====================
// РЕНДЕР
// =====================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// УПРАВЛЕНИЕ
// =====================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

controls.mouseButtons = {
  LEFT: null,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE
};

// =====================
// СВЕТ
// =====================
scene.add(new THREE.AmbientLight(0x404040));

const light = new THREE.DirectionalLight(0x99ccff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// =====================
// КОРАБЛЬ
// =====================
// =====================
// КОРАБЛЬ — ОБЪЕМНЫЙ КОРПУС
// =====================
const ship = new THREE.Group();

// ---------- материалы ----------
const hullMat = new THREE.MeshStandardMaterial({
  color: 0x4a2d1c,
  roughness: 0.95
});

const hullDarkMat = new THREE.MeshStandardMaterial({
  color: 0x2f1b12,
  roughness: 0.98
});

const deckWoodMat = new THREE.MeshStandardMaterial({
  color: 0xa56b3f,
  roughness: 0.96
});

const railMat = new THREE.MeshStandardMaterial({
  color: 0x5b3723,
  roughness: 0.95
});

const trimMat = new THREE.MeshStandardMaterial({
  color: 0x7a4c2d,
  roughness: 0.93
});

const metalMat = new THREE.MeshStandardMaterial({
  color: 0x626872,
  roughness: 0.7,
  metalness: 0.5
});

const brassMat = new THREE.MeshStandardMaterial({
  color: 0xb38a42,
  roughness: 0.45,
  metalness: 0.85
});

// ---------- текстура палубы ----------
function createDeckTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 1024;
  canvas.height = 2048;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#9e663b";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let x = 0;
  while (x < canvas.width) {
    const w = 20 + Math.random() * 18;
    const tone = 105 + Math.floor(Math.random() * 35);

    ctx.fillStyle = `rgb(${tone + 28}, ${tone}, ${Math.max(40, tone - 35)})`;
    ctx.fillRect(x, 0, w, canvas.height);

    ctx.fillStyle = "rgba(50,28,14,0.28)";
    ctx.fillRect(x + w - 2, 0, 2, canvas.height);

    for (let y = 40; y < canvas.height; y += 140 + Math.random() * 90) {
      ctx.fillStyle = "rgba(45,26,13,0.22)";
      ctx.fillRect(x + 2, y, Math.max(4, w - 4), 2);
    }

    x += w;
  }

  for (let i = 0; i < 1400; i++) {
    const xx = Math.random() * canvas.width;
    const yy = Math.random() * canvas.height;
    const len = 4 + Math.random() * 14;

    ctx.strokeStyle = `rgba(255,255,255,${0.01 + Math.random() * 0.02})`;
    ctx.beginPath();
    ctx.moveTo(xx, yy);
    ctx.lineTo(xx + len, yy + (Math.random() - 0.5) * 4);
    ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

const deckTexture = createDeckTexture();

const deckMat = new THREE.MeshStandardMaterial({
  map: deckTexture,
  color: 0xffffff,
  roughness: 0.97
});

// ---------- форма корабля ----------
function createShipShape(scale = 1) {
  const s = new THREE.Shape();

  // нос в -Z, корма в +Z
  s.moveTo(0, -13.5 * scale);

  s.bezierCurveTo(
    1.4 * scale, -13.1 * scale,
    3.6 * scale, -10.0 * scale,
    4.3 * scale, -6.2 * scale
  );

  s.bezierCurveTo(
    4.9 * scale, -2.4 * scale,
    4.8 * scale, 4.5 * scale,
    4.1 * scale, 8.6 * scale
  );

  s.quadraticCurveTo(
    3.8 * scale, 10.5 * scale,
    3.2 * scale, 11.7 * scale
  );

  // плоская корма
  s.lineTo(2.8 * scale, 12.8 * scale);
  s.lineTo(-2.8 * scale, 12.8 * scale);

  s.quadraticCurveTo(
    -3.8 * scale, 10.5 * scale,
    -4.1 * scale, 8.6 * scale
  );

  s.bezierCurveTo(
    -4.8 * scale, 4.5 * scale,
    -4.9 * scale, -2.4 * scale,
    -4.3 * scale, -6.2 * scale
  );

  s.bezierCurveTo(
    -3.6 * scale, -10.0 * scale,
    -1.4 * scale, -13.1 * scale,
    0, -13.5 * scale
  );

  return s;
}

function makeExtruded(shape, depth) {
  const geom = new THREE.ExtrudeGeometry(shape, {
    depth,
    bevelEnabled: false,
    curveSegments: 64
  });
  geom.rotateX(-Math.PI / 2);
  return geom;
}

function addBox(w, h, d, mat, x, y, z, rx = 0, ry = 0, rz = 0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.rotation.set(rx, ry, rz);
  ship.add(m);
  return m;
}

function addCylinder(rt, rb, h, seg, mat, x, y, z, rx = 0, ry = 0, rz = 0) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
  m.position.set(x, y, z);
  m.rotation.set(rx, ry, rz);
  ship.add(m);
  return m;
}

function addRailPost(x, z, y = 0.95) {
  addBox(0.08, 0.38, 0.08, railMat, x, y, z);
}

function addRailSegment(x1, z1, x2, z2, y) {
  const dx = x2 - x1;
  const dz = z2 - z1;
  const len = Math.sqrt(dx * dx + dz * dz);

  const rail = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.08, len),
    railMat
  );

  rail.position.set((x1 + x2) / 2, y, (z1 + z2) / 2);
  rail.rotation.y = Math.atan2(dx, dz);
  ship.add(rail);
}

function addStepRun(centerZ, steps, dir = 1, startY = 0.52) {
  for (let i = 0; i < steps; i++) {
    addBox(
      1.8 - i * 0.16,
      0.08,
      0.30,
      trimMat,
      0,
      startY + i * 0.07,
      centerZ + i * 0.28 * dir
    );
  }
}

function halfWidthAt(z) {
  if (z < -12) return 0.7;
  if (z < -9)  return THREE.MathUtils.lerp(1.0, 2.8, (z + 12) / 3);
  if (z < -5)  return THREE.MathUtils.lerp(2.8, 4.0, (z + 9) / 4);
  if (z < 5)   return 4.15;
  if (z < 9)   return THREE.MathUtils.lerp(4.15, 3.5, (z - 5) / 4);
  if (z < 12.4) return THREE.MathUtils.lerp(3.5, 2.7, (z - 9) / 3.4);
  return 2.5;
}

function createDeckEdgeShape(railOffset = 0.05) {
  const zVals = [-12.2, -11.0, -9.0, -7.0, -5.0, -2.0, 1.0, 4.0, 6.5, 8.8, 10.5, 11.8, 12.3];

  const right = zVals.map(z => ({
    x: halfWidthAt(z) - 0.30 + railOffset,
    z
  }));

  const left = [...right].reverse().map(p => ({
    x: -p.x,
    z: p.z
  }));

  const shape = new THREE.Shape();

  // нос
  shape.moveTo(0, -12.9);

  // правая сторона
  shape.quadraticCurveTo(
    right[0].x * 0.45, -12.75,
    right[0].x, right[0].z
  );

  for (let i = 1; i < right.length; i++) {
    shape.lineTo(right[i].x, right[i].z);
  }

  // плоская корма
  shape.lineTo(-right[right.length - 1].x, right[right.length - 1].z);

  // левая сторона
  for (let i = 0; i < left.length; i++) {
    shape.lineTo(left[i].x, left[i].z);
  }

  // обратно в нос
  shape.quadraticCurveTo(
    -right[0].x * 0.45, -12.75,
    0, -12.9
  );

  shape.closePath();
  return shape;
}  
  
// ---------- нижний корпус ----------
const hullOuter = new THREE.Mesh(
  makeExtruded(createShipShape(1.06), 0.95),
  hullMat
);
hullOuter.position.y = -0.20;
ship.add(hullOuter);

const hullMid = new THREE.Mesh(
  makeExtruded(createShipShape(0.92), 0.85),
  hullDarkMat
);
hullMid.position.y = -0.95;
ship.add(hullMid);

const keel = new THREE.Mesh(
  makeExtruded(createShipShape(0.55), 0.70),
  hullDarkMat
);
keel.position.y = -1.55;
ship.add(keel);

// ---------- палуба ----------
// ---------- палуба по линии перил ----------
const deckShape = createDeckEdgeShape(0.05);

const deckGeom = new THREE.ShapeGeometry(deckShape, 64);
deckGeom.rotateX(-Math.PI / 2);

const deck = new THREE.Mesh(deckGeom, deckMat);
deck.position.y = 0.39;
ship.add(deck);

// тонкая кромка палубы вниз, чтобы край читался объемно
const deckLip = new THREE.Mesh(
  makeExtruded(createDeckEdgeShape(0.02), 0.12),
  trimMat
);
deckLip.position.y = 0.27;
ship.add(deckLip);

// центральная темная дорожка — чуть уже
const centerStrip = new THREE.Mesh(
  new THREE.PlaneGeometry(0.95, 18.2),
  new THREE.MeshStandardMaterial({
    color: 0x7d4f2d,
    transparent: true,
    opacity: 0.24,
    roughness: 1
  })
);
centerStrip.rotation.x = -Math.PI / 2;
centerStrip.position.set(0, 0.395, 0.8);
ship.add(centerStrip);

// ---------- носовая площадка ----------
addBox(2.8, 0.22, 4.2, trimMat, 0, 0.63, -9.0);
addStepRun(-7.8, 4, -1, 0.48);

// носовые перила
const bowRailPts = [
  { x: -1.15, z: -11.0 },
  { x: -0.85, z: -12.0 },
  { x:  0.00, z: -12.6 },
  { x:  0.85, z: -12.0 },
  { x:  1.15, z: -11.0 }
];

for (const p of bowRailPts) addRailPost(p.x, p.z, 1.00);
for (let i = 0; i < bowRailPts.length - 1; i++) {
  addRailSegment(
    bowRailPts[i].x, bowRailPts[i].z,
    bowRailPts[i + 1].x, bowRailPts[i + 1].z,
    1.08
  );
}

// бушприт
addCylinder(0.05, 0.08, 2.8, 10, railMat, 0, 0.92, -13.9, Math.PI / 2, 0, 0);

// ---------- центральная палубная зона ----------
addBox(1.9, 0.18, 2.6, trimMat, 0, 0.50, -1.0);
addBox(1.0, 0.28, 1.4, metalMat, 0, 0.64, 0.2);

addCylinder(0.25, 0.30, 0.36, 16, brassMat, 0, 0.70, 0.2);
addCylinder(0.10, 0.10, 0.30, 12, metalMat, 0, 0.95, 0.2);

// боковые блоки/ящики
for (const z of [-4.8, -3.0, -1.2, 1.0, 3.2, 5.4]) {
  const x = Math.abs(z) > 4 ? 3.25 : 3.65;
  addBox(0.85, 0.22, 0.75, railMat, -x, 0.56, z, 0, 0, -0.14);
  addBox(0.85, 0.22, 0.75, railMat,  x, 0.56, z, 0, 0,  0.14);
}

// ---------- кормовая надстройка ----------
addBox(5.2, 0.26, 3.6, trimMat, 0, 0.72, 10.0);

// стены кормовой надстройки
addBox(5.2, 1.55, 0.18, hullMat, 0, 1.52, 11.7);
addBox(0.18, 1.25, 2.8, hullMat, -2.5, 1.38, 10.2);
addBox(0.18, 1.25, 2.8, hullMat,  2.5, 1.38, 10.2);

// внутренняя верхняя площадка
addBox(3.0, 0.18, 2.2, deckWoodMat, 0, 1.28, 10.2);

// лестница на корму
addStepRun(7.9, 5, 1, 0.48);

// кормовые перила
const sternPtsLeft = [
  { x: -2.7, z: 8.8 },
  { x: -3.0, z: 10.0 },
  { x: -2.9, z: 11.8 }
];
const sternPtsRight = [
  { x:  2.7, z: 8.8 },
  { x:  3.0, z: 10.0 },
  { x:  2.9, z: 11.8 }
];

for (const p of sternPtsLeft) addRailPost(p.x, p.z, 1.02);
for (const p of sternPtsRight) addRailPost(p.x, p.z, 1.02);

for (let i = 0; i < sternPtsLeft.length - 1; i++) {
  addRailSegment(
    sternPtsLeft[i].x, sternPtsLeft[i].z,
    sternPtsLeft[i + 1].x, sternPtsLeft[i + 1].z,
    1.10
  );
  addRailSegment(
    sternPtsRight[i].x, sternPtsRight[i].z,
    sternPtsRight[i + 1].x, sternPtsRight[i + 1].z,
    1.10
  );
}

addRailSegment(-2.9, 11.8, 2.9, 11.8, 1.10);

// ---------- боковые перила по палубе ----------
const railPointsLeft = [];
const railPointsRight = [];

for (let z = -8.5; z <= 8.5; z += 1.7) {
  const x = halfWidthAt(z) - 0.30;
  railPointsLeft.push({ x: -x, z });
  railPointsRight.push({ x: x, z });
}

for (const p of railPointsLeft) addRailPost(p.x, p.z, 0.96);
for (const p of railPointsRight) addRailPost(p.x, p.z, 0.96);

for (let i = 0; i < railPointsLeft.length - 1; i++) {
  addRailSegment(
    railPointsLeft[i].x, railPointsLeft[i].z,
    railPointsLeft[i + 1].x, railPointsLeft[i + 1].z,
    1.04
  );
  addRailSegment(
    railPointsRight[i].x, railPointsRight[i].z,
    railPointsRight[i + 1].x, railPointsRight[i + 1].z,
    1.04
  );
}

// ---------- декоративные стойки / опоры ----------
for (const z of [-8.0, -4.0, 0.0, 4.0, 8.0]) {
  const x = halfWidthAt(z) - 0.12;
  addBox(0.10, 0.60, 0.10, railMat, -x, 0.68, z);
  addBox(0.10, 0.60, 0.10, railMat,  x, 0.68, z);
}

// ---------- корабль уже ориентирован носом вперед ----------
scene.add(ship);

// =====================
// ОБЛАКА И ВЕТЕР
// =====================
const clock = new THREE.Clock();

const cloudLayer = new THREE.Group();
const windLayer = new THREE.Group();
scene.add(cloudLayer);
scene.add(windLayer);

const clouds = [];
const windStreaks = [];

// мягкая текстура облака
function createCloudTexture() {
  const size = 128;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  const g = ctx.createRadialGradient(
    size / 2, size / 2, 10,
    size / 2, size / 2, size / 2
  );

  g.addColorStop(0.0, "rgba(255,255,255,0.95)");
  g.addColorStop(0.35, "rgba(255,255,255,0.65)");
  g.addColorStop(0.7, "rgba(220,235,255,0.25)");
  g.addColorStop(1.0, "rgba(255,255,255,0.0)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);

  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

// текстура полосы ветра
function createWindTexture() {
  const w = 128;
  const h = 32;
  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d");
  const g = ctx.createLinearGradient(0, 0, w, 0);

  g.addColorStop(0.0, "rgba(255,255,255,0.0)");
  g.addColorStop(0.5, "rgba(255,255,255,0.9)");
  g.addColorStop(1.0, "rgba(255,255,255,0.0)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

const cloudTexture = createCloudTexture();
const windTexture = createWindTexture();

function resetCloud(cloud, spawnAhead = false) {
  cloud.position.x = THREE.MathUtils.randFloatSpread(30);
  cloud.position.y = THREE.MathUtils.randFloat(5, 14);
  cloud.position.z = spawnAhead
    ? THREE.MathUtils.randFloat(-140, -70)
    : THREE.MathUtils.randFloat(-120, 80);

  cloud.userData.speed = THREE.MathUtils.randFloat(0.03, 0.08);
  cloud.userData.spin = THREE.MathUtils.randFloat(-0.0015, 0.0015);
}

function createCloud() {
  const group = new THREE.Group();

  const puffCount = THREE.MathUtils.randInt(5, 9);

  for (let i = 0; i < puffCount; i++) {
    const material = new THREE.SpriteMaterial({
      map: cloudTexture,
      transparent: true,
      opacity: THREE.MathUtils.randFloat(0.18, 0.42),
      depthWrite: false
    });

    const sprite = new THREE.Sprite(material);

    const s = THREE.MathUtils.randFloat(4, 8);
    sprite.scale.set(s, s * 0.65, 1);

    sprite.position.set(
      THREE.MathUtils.randFloatSpread(6),
      THREE.MathUtils.randFloat(-1.2, 1.2),
      THREE.MathUtils.randFloatSpread(4)
    );

    group.add(sprite);
  }

  resetCloud(group, false);
  cloudLayer.add(group);
  clouds.push(group);
}

function resetWindStreak(streak, spawnAhead = false) {
  streak.position.x = THREE.MathUtils.randFloatSpread(18);
  streak.position.y = THREE.MathUtils.randFloat(1.5, 9);
  streak.position.z = spawnAhead
    ? THREE.MathUtils.randFloat(-35, -10)
    : THREE.MathUtils.randFloat(-30, 25);

  const len = THREE.MathUtils.randFloat(1.2, 3.5);
  streak.scale.set(len, 0.08, 1);

  streak.material.opacity = THREE.MathUtils.randFloat(0.08, 0.22);
  streak.userData.speed = THREE.MathUtils.randFloat(0.35, 0.9);
}

function createWindStreak() {
  const material = new THREE.SpriteMaterial({
    map: windTexture,
    transparent: true,
    opacity: 0.15,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const streak = new THREE.Sprite(material);
  resetWindStreak(streak, false);

  windLayer.add(streak);
  windStreaks.push(streak);
}

// создаем облака
for (let i = 0; i < 24; i++) {
  createCloud();
}

// создаем полосы ветра
for (let i = 0; i < 45; i++) {
  createWindStreak();
}
  
// =====================
// СЕТКА
// =====================
const gridCells = [];
const size = 10;

for (let x = 0; x < size; x++) {
  for (let z = 0; z < size; z++) {
    const cell = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        color: 0x00ff88,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide
      })
    );

    cell.rotation.x = -Math.PI / 2;
    cell.position.set((x - size / 2) + 0.5, 0.51, (z - size / 2) + 0.5);

    const dx = cell.position.x / 5;
    const dz = cell.position.z / 10;

    if (dx * dx + dz * dz > 1) continue;

cell.layers.enable(LAYER_GRID);
scene.add(cell);
gridCells.push(cell);
  }
}

// =====================
// ФИШКИ
// =====================
const tokens = [];
let selected = null;

function isCellOccupied(cell, ignoreToken = null) {
  return tokens.some(token =>
    token !== ignoreToken &&
    Math.abs(token.position.x - cell.position.x) < 0.01 &&
    Math.abs(token.position.z - cell.position.z) < 0.01
  );
}

function updateMouseAndRay(event) {
  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
}

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

function setTokenSelected(token, isSelected) {
  token.traverse((child) => {
    if (child.isMesh && child.material && child.material.emissive) {
      child.material.emissive.setHex(isSelected ? 0x333333 : 0x000000);
    }
  });
}

// создание фишки
function createToken(x, z) {
  const group = new THREE.Group();
  group.userData.isToken = true;

  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.5, 0.2, 16),
    new THREE.MeshStandardMaterial({ color: 0xdddddd })
  );

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 0.6, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  body.position.y = 0.4;

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  head.position.y = 0.8;

  group.add(base, body, head);
group.position.set(x, 0.51, z);

enableLayerRecursive(group, LAYER_TOKEN);

scene.add(group);
tokens.push(group);

group.updateMatrixWorld(true);
}

// =====================
// ДОБАВЛЕНИЕ ФИШКИ
// =====================
document.getElementById("addToken").onclick = () => {
  const freeCells = gridCells.filter(cell => !isCellOccupied(cell));

  if (freeCells.length === 0) return;

  const cell = freeCells[Math.floor(Math.random() * freeCells.length)];
  createToken(cell.position.x, cell.position.z);
};

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

renderer.domElement.addEventListener("pointermove", (e) => {
  if (!selected) return;

  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

  selected.position.x = cell.position.x;
  selected.position.z = cell.position.z;
});

renderer.domElement.addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return;

  e.preventDefault();
  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  // 1. Выбор фишки
  if (!selected) {
    raycaster.layers.set(LAYER_TOKEN);
    const tokenHits = raycaster.intersectObjects(tokens, true);

    console.log("tokenHits:", tokenHits.length, tokenHits[0]?.object);

    if (tokenHits.length > 0) {
      const token = getTokenRoot(tokenHits[0].object);

      if (token) {
        selected = token;
        setTokenSelected(selected, true);
        selected.position.y = 0.7; // чуть приподнимаем для наглядности
        controls.enabled = false;
      }
    }

    return;
  }

  // 2. Постановка на клетку
  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  console.log("gridHits:", gridHits.length, gridHits[0]?.object);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

  selected.position.x = cell.position.x;
  selected.position.y = 0.51;
  selected.position.z = cell.position.z;

  setTokenSelected(selected, false);
  selected = null;
  controls.enabled = true;
});

// =====================
// АНИМАЦИЯ
// =====================
function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // движение облаков:
  // корабль как будто летит вперед (в сторону -Z),
  // поэтому облака медленно уходят назад (+Z)
  for (const cloud of clouds) {
    cloud.position.z += cloud.userData.speed;
    cloud.rotation.y += cloud.userData.spin;

    if (cloud.position.z > 90) {
      resetCloud(cloud, true);
    }
  }

  // ветер летит быстрее облаков
  for (const streak of windStreaks) {
    streak.position.z += streak.userData.speed;

    if (streak.position.z > 30) {
      resetWindStreak(streak, true);
    }
  }

  renderer.render(scene, camera);
}
animate();

// =====================
// RESIZE
// =====================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
