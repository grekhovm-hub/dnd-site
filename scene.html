<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Airship Scene</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#ui {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

#addToken {
  font-size: 24px;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">
  <button id="addToken">+</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// =====================
// СЦЕНА
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

const LAYER_DEFAULT = 0;
const LAYER_TOKEN = 1;
const LAYER_GRID = 2;

function enableLayerRecursive(obj, layer) {
  obj.layers.enable(layer);
  obj.traverse(child => child.layers.enable(layer));
}

// =====================
// КАМЕРА
// =====================
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 15, 20);

// =====================
// РЕНДЕР
// =====================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// УПРАВЛЕНИЕ
// =====================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

controls.mouseButtons = {
  LEFT: null,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE
};

// =====================
// СВЕТ
// =====================
scene.add(new THREE.AmbientLight(0x404040));

const light = new THREE.DirectionalLight(0x99ccff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// =====================
// КОРАБЛЬ
// =====================
// =====================
// КОРАБЛЬ — ДЕТАЛЬНАЯ ПАЛУБА В ВИДЕ СВЕРХУ
// =====================
const ship = new THREE.Group();

function createShipShape(scale = 1) {
  const s = new THREE.Shape();

  s.moveTo(0, -12.0 * scale);

  s.bezierCurveTo(
    2.4 * scale, -11.2 * scale,
    5.3 * scale, -7.0 * scale,
    5.15 * scale, 1.8 * scale
  );

  s.quadraticCurveTo(
    5.0 * scale, 8.8 * scale,
    3.5 * scale, 11.4 * scale
  );

  s.quadraticCurveTo(
    1.8 * scale, 12.5 * scale,
    0, 12.0 * scale
  );

  s.quadraticCurveTo(
    -1.8 * scale, 12.5 * scale,
    -3.5 * scale, 11.4 * scale
  );

  s.quadraticCurveTo(
    -5.0 * scale, 8.8 * scale,
    -5.15 * scale, 1.8 * scale
  );

  s.bezierCurveTo(
    -5.3 * scale, -7.0 * scale,
    -2.4 * scale, -11.2 * scale,
    0, -12.0 * scale
  );

  return s;
}

function addMesh(geometry, material, x, y, z, rx = 0, ry = 0, rz = 0) {
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(x, y, z);
  mesh.rotation.set(rx, ry, rz);
  ship.add(mesh);
  return mesh;
}

function addBox(w, h, d, material, x, y, z, rx = 0, ry = 0, rz = 0) {
  return addMesh(new THREE.BoxGeometry(w, h, d), material, x, y, z, rx, ry, rz);
}

function addCylinder(rt, rb, h, seg, material, x, y, z, rx = 0, ry = 0, rz = 0) {
  return addMesh(new THREE.CylinderGeometry(rt, rb, h, seg), material, x, y, z, rx, ry, rz);
}

function addPlane(w, h, material, x, y, z, rx = -Math.PI / 2, ry = 0, rz = 0) {
  return addMesh(new THREE.PlaneGeometry(w, h), material, x, y, z, rx, ry, rz);
}

function addRailPost(x, z) {
  addBox(0.10, 0.45, 0.10, railMat, x, 0.68, z);
}

function addLamp(x, z) {
  addCylinder(0.04, 0.04, 0.28, 10, brassMat, x, 0.66, z);
  addMesh(
    new THREE.SphereGeometry(0.07, 12, 12),
    lampMat,
    x, 0.86, z
  );
}

function addSideBundle(side, z, angle = 0) {
  const x = side * (Math.abs(z) > 7 ? 2.8 : Math.abs(z) > 4 ? 3.6 : 4.0);

  addBox(0.85, 0.18, 0.70, darkWoodMat, x, 0.57, z, 0, 0, angle);
  addBox(0.58, 0.22, 0.45, clothMat, x, 0.73, z, 0, 0, angle);
}

function addSteps(centerZ, stepCount, dir = 1) {
  for (let i = 0; i < stepCount; i++) {
    addBox(
      1.8 - i * 0.12,
      0.10,
      0.32,
      darkWoodMat,
      0,
      0.56 + i * 0.06,
      centerZ + i * 0.28 * dir
    );
  }
}

function addChair(x, z, rotY = 0) {
  addBox(0.42, 0.10, 0.42, redFabricMat, x, 0.62, z, 0, rotY, 0);
  addBox(0.42, 0.42, 0.08, darkWoodMat, x, 0.79, z - 0.16 * Math.cos(rotY), 0, rotY, 0);
}

function createDeckTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 1024;
  canvas.height = 2048;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#a46a3b";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // длинные доски
  let x = 0;
  while (x < canvas.width) {
    const w = 18 + Math.random() * 16;
    const tone = 120 + Math.floor(Math.random() * 45);
    ctx.fillStyle = `rgb(${tone + 20}, ${tone}, ${Math.max(40, tone - 35)})`;
    ctx.fillRect(x, 0, w, canvas.height);

    ctx.fillStyle = "rgba(60, 35, 18, 0.35)";
    ctx.fillRect(x + w - 2, 0, 2, canvas.height);

    // поперечные стыки досок
    for (let y = 0; y < canvas.height; y += 180 + Math.random() * 120) {
      const yy = y + Math.random() * 30;
      ctx.fillStyle = "rgba(50, 30, 15, 0.28)";
      ctx.fillRect(x + 2, yy, Math.max(6, w - 4), 2);
    }

    x += w;
  }

  // легкие царапины / шум
  for (let i = 0; i < 1800; i++) {
    const xx = Math.random() * canvas.width;
    const yy = Math.random() * canvas.height;
    const len = 4 + Math.random() * 18;

    ctx.strokeStyle = `rgba(255,255,255,${0.015 + Math.random() * 0.02})`;
    ctx.beginPath();
    ctx.moveTo(xx, yy);
    ctx.lineTo(xx + len, yy + (Math.random() - 0.5) * 4);
    ctx.stroke();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

// если у тебя будет своя топ-даун текстура палубы,
// замени useImageDeck = true и путь ниже на свой PNG/JPG
const useImageDeck = false;
const deckTexture = useImageDeck
  ? new THREE.TextureLoader().load("textures/airship-deck-topdown.png")
  : createDeckTexture();

deckTexture.colorSpace = THREE.SRGBColorSpace;
deckTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();

// материалы
const hullMat = new THREE.MeshStandardMaterial({
  color: 0x3b2417,
  roughness: 0.95
});

const railMat = new THREE.MeshStandardMaterial({
  color: 0x4a2c1b,
  roughness: 0.92
});

const deckMat = new THREE.MeshStandardMaterial({
  map: deckTexture,
  color: 0xffffff,
  roughness: 0.96
});

const darkWoodMat = new THREE.MeshStandardMaterial({
  color: 0x5a341e,
  roughness: 0.94
});

const metalMat = new THREE.MeshStandardMaterial({
  color: 0x58616c,
  roughness: 0.7,
  metalness: 0.55
});

const brassMat = new THREE.MeshStandardMaterial({
  color: 0xb1843f,
  roughness: 0.45,
  metalness: 0.85
});

const clothMat = new THREE.MeshStandardMaterial({
  color: 0xd7d0c2,
  roughness: 1.0
});

const blueFabricMat = new THREE.MeshStandardMaterial({
  color: 0x355f8c,
  roughness: 0.95
});

const purpleFabricMat = new THREE.MeshStandardMaterial({
  color: 0x6d4fa3,
  roughness: 0.95
});

const redFabricMat = new THREE.MeshStandardMaterial({
  color: 0x8b2f2f,
  roughness: 0.95
});

const lampMat = new THREE.MeshBasicMaterial({
  color: 0xffc76a
});

// корпус
const hullShape = createShipShape(1.04);
const deckShape = createShipShape(1.0);

const hullGeom = new THREE.ExtrudeGeometry(hullShape, {
  depth: 0.72,
  bevelEnabled: false,
  curveSegments: 48
});
hullGeom.rotateX(-Math.PI / 2);

const hull = new THREE.Mesh(hullGeom, hullMat);
hull.position.y = 0.43; // ниже сетки
ship.add(hull);

// палуба
const deckGeom = new THREE.ShapeGeometry(deckShape, 48);
deckGeom.rotateX(-Math.PI / 2);

const deck = new THREE.Mesh(deckGeom, deckMat);
deck.position.y = 0.465; // ниже зеленой сетки
ship.add(deck);

// темная центральная полоса
const stripGeom = new THREE.PlaneGeometry(1.1, 20.0);
const stripMat = new THREE.MeshStandardMaterial({
  color: 0x8d5c33,
  transparent: true,
  opacity: 0.30,
  roughness: 1.0
});
const strip = new THREE.Mesh(stripGeom, stripMat);
strip.rotation.x = -Math.PI / 2;
strip.position.set(0, 0.468, 0.2);
ship.add(strip);

// борта — стойки
const railPoints = [
  { z: -9.8, x: 1.6 },
  { z: -8.2, x: 2.5 },
  { z: -6.5, x: 3.4 },
  { z: -4.5, x: 4.0 },
  { z: -2.0, x: 4.35 },
  { z:  1.0, x: 4.35 },
  { z:  4.0, x: 4.15 },
  { z:  6.5, x: 3.8 },
  { z:  8.8, x: 3.1 },
  { z: 10.5, x: 2.4 }
];

for (const p of railPoints) {
  addRailPost( p.x, p.z);
  addRailPost(-p.x, p.z);
}

// тонкие продольные борта
for (const side of [-1, 1]) {
  addBox(0.16, 0.16, 8.5, railMat, side * 4.45, 0.78, -0.8, 0, 0, side * 0.08);
  addBox(0.16, 0.16, 5.8, railMat, side * 3.9,  0.78,  7.0, 0, 0, side * 0.15);
  addBox(0.16, 0.16, 4.6, railMat, side * 3.0,  0.78, -7.9, 0, 0, side * 0.32);
}

// носовая часть
addBox(1.6, 0.5, 1.2, darkWoodMat, 0, 0.72, -5.9);
addSteps(-4.8, 4, 1);

addBox(0.95, 0.16, 0.18, railMat, 0, 0.62, -8.4);
addBox(0.95, 0.16, 0.18, railMat, 0, 0.62, -8.0);
addBox(0.95, 0.16, 0.18, railMat, 0, 0.62, -7.6);

// центральный технический отсек / колодец
const ovalFloor = new THREE.Mesh(
  new THREE.CircleGeometry(1.85, 40),
  metalMat
);
ovalFloor.rotation.x = -Math.PI / 2;
ovalFloor.scale.set(1.0, 1.45, 1.0);
ovalFloor.position.set(0, 0.49, 0.4);
ship.add(ovalFloor);

const ovalRim = new THREE.Mesh(
  new THREE.TorusGeometry(1.72, 0.08, 12, 48),
  brassMat
);
ovalRim.rotation.x = Math.PI / 2;
ovalRim.scale.set(1.0, 1.42, 1.0);
ovalRim.position.set(0, 0.55, 0.4);
ship.add(ovalRim);

addCylinder(0.26, 0.34, 0.44, 16, brassMat, 0, 0.72, 0.15);
addCylinder(0.12, 0.12, 0.42, 14, metalMat, 0, 0.98, 0.15);
addMesh(new THREE.TorusGeometry(0.26, 0.05, 10, 24), brassMat, 0, 1.12, 0.15, Math.PI / 2, 0, 0);

// боковые лежаки/тюки/ящики
for (const z of [-5.7, -4.2, -2.7, -1.2, 0.3, 1.8, 3.3, 4.8, 6.3]) {
  addSideBundle(-1, z, -0.12);
  addSideBundle( 1, z,  0.12);
}

// капитанская зона
addPlane(1.5, 1.9, new THREE.MeshStandardMaterial({ color: 0x3c6477 }), -1.05, 0.475, 5.55);
addPlane(1.5, 1.9, new THREE.MeshStandardMaterial({ color: 0x3c6477 }),  1.05, 0.475, 5.55);
addPlane(0.8, 1.9, purpleFabricMat, 0, 0.476, 5.55);

addCylinder(0.52, 0.62, 0.24, 18, brassMat, 0, 0.62, 5.2);
addMesh(new THREE.SphereGeometry(0.28, 16, 16), new THREE.MeshBasicMaterial({ color: 0x6dff8b }), 0, 0.86, 5.2);
addChair(0, 6.15, Math.PI);

// лестница к корме
addSteps(7.2, 4, 1);

// кормовая зона отдыха / карта
addPlane(1.25, 3.0, purpleFabricMat, 0, 0.476, 9.1);
addPlane(2.4, 1.3, new THREE.MeshStandardMaterial({ color: 0x6f5e2f }), 0, 0.477, 10.1);

addBox(2.7, 0.18, 1.4, darkWoodMat, 0, 0.64, 10.0);
addPlane(2.2, 0.9, new THREE.MeshStandardMaterial({ color: 0xd8c9a8 }), 0, 0.735, 10.0);

addChair(-1.05,  9.45,  0.2);
addChair( 1.05,  9.45, -0.2);
addChair(-0.95, 10.75, Math.PI - 0.2);
addChair( 0.95, 10.75, Math.PI + 0.2);

// книги/ящики по бокам кормы
addBox(0.45, 0.52, 1.6, darkWoodMat, -2.4, 0.72, 9.2);
addBox(0.45, 0.52, 1.6, darkWoodMat,  2.4, 0.72, 9.2);

// фонари
for (const p of [
  [-2.2, -2.2], [2.2, -2.2],
  [-2.4,  4.4], [2.4,  4.4],
  [-2.2,  8.2], [2.2,  8.2]
]) {
  addLamp(p[0], p[1]);
}

// носовой бушприт / декоративная стойка
addBox(0.10, 2.2, 0.10, railMat, 0, 1.45, -10.8, -0.12, 0, 0);
addMesh(new THREE.TorusGeometry(0.22, 0.03, 8, 20), brassMat, 0, 1.25, -10.2, Math.PI / 2, 0, 0);

scene.add(ship);

// =====================
// ОБЛАКА И ВЕТЕР
// =====================
const clock = new THREE.Clock();

const cloudLayer = new THREE.Group();
const windLayer = new THREE.Group();
scene.add(cloudLayer);
scene.add(windLayer);

const clouds = [];
const windStreaks = [];

// мягкая текстура облака
function createCloudTexture() {
  const size = 128;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  const g = ctx.createRadialGradient(
    size / 2, size / 2, 10,
    size / 2, size / 2, size / 2
  );

  g.addColorStop(0.0, "rgba(255,255,255,0.95)");
  g.addColorStop(0.35, "rgba(255,255,255,0.65)");
  g.addColorStop(0.7, "rgba(220,235,255,0.25)");
  g.addColorStop(1.0, "rgba(255,255,255,0.0)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);

  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

// текстура полосы ветра
function createWindTexture() {
  const w = 128;
  const h = 32;
  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d");
  const g = ctx.createLinearGradient(0, 0, w, 0);

  g.addColorStop(0.0, "rgba(255,255,255,0.0)");
  g.addColorStop(0.5, "rgba(255,255,255,0.9)");
  g.addColorStop(1.0, "rgba(255,255,255,0.0)");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

const cloudTexture = createCloudTexture();
const windTexture = createWindTexture();

function resetCloud(cloud, spawnAhead = false) {
  cloud.position.x = THREE.MathUtils.randFloatSpread(30);
  cloud.position.y = THREE.MathUtils.randFloat(5, 14);
  cloud.position.z = spawnAhead
    ? THREE.MathUtils.randFloat(-140, -70)
    : THREE.MathUtils.randFloat(-120, 80);

  cloud.userData.speed = THREE.MathUtils.randFloat(0.03, 0.08);
  cloud.userData.spin = THREE.MathUtils.randFloat(-0.0015, 0.0015);
}

function createCloud() {
  const group = new THREE.Group();

  const puffCount = THREE.MathUtils.randInt(5, 9);

  for (let i = 0; i < puffCount; i++) {
    const material = new THREE.SpriteMaterial({
      map: cloudTexture,
      transparent: true,
      opacity: THREE.MathUtils.randFloat(0.18, 0.42),
      depthWrite: false
    });

    const sprite = new THREE.Sprite(material);

    const s = THREE.MathUtils.randFloat(4, 8);
    sprite.scale.set(s, s * 0.65, 1);

    sprite.position.set(
      THREE.MathUtils.randFloatSpread(6),
      THREE.MathUtils.randFloat(-1.2, 1.2),
      THREE.MathUtils.randFloatSpread(4)
    );

    group.add(sprite);
  }

  resetCloud(group, false);
  cloudLayer.add(group);
  clouds.push(group);
}

function resetWindStreak(streak, spawnAhead = false) {
  streak.position.x = THREE.MathUtils.randFloatSpread(18);
  streak.position.y = THREE.MathUtils.randFloat(1.5, 9);
  streak.position.z = spawnAhead
    ? THREE.MathUtils.randFloat(-35, -10)
    : THREE.MathUtils.randFloat(-30, 25);

  const len = THREE.MathUtils.randFloat(1.2, 3.5);
  streak.scale.set(len, 0.08, 1);

  streak.material.opacity = THREE.MathUtils.randFloat(0.08, 0.22);
  streak.userData.speed = THREE.MathUtils.randFloat(0.35, 0.9);
}

function createWindStreak() {
  const material = new THREE.SpriteMaterial({
    map: windTexture,
    transparent: true,
    opacity: 0.15,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const streak = new THREE.Sprite(material);
  resetWindStreak(streak, false);

  windLayer.add(streak);
  windStreaks.push(streak);
}

// создаем облака
for (let i = 0; i < 24; i++) {
  createCloud();
}

// создаем полосы ветра
for (let i = 0; i < 45; i++) {
  createWindStreak();
}
  
// =====================
// СЕТКА
// =====================
const gridCells = [];
const size = 10;

for (let x = 0; x < size; x++) {
  for (let z = 0; z < size; z++) {
    const cell = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        color: 0x00ff88,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide
      })
    );

    cell.rotation.x = -Math.PI / 2;
    cell.position.set((x - size / 2) + 0.5, 0.51, (z - size / 2) + 0.5);

    const dx = cell.position.x / 5;
    const dz = cell.position.z / 10;

    if (dx * dx + dz * dz > 1) continue;

cell.layers.enable(LAYER_GRID);
scene.add(cell);
gridCells.push(cell);
  }
}

// =====================
// ФИШКИ
// =====================
const tokens = [];
let selected = null;

function isCellOccupied(cell, ignoreToken = null) {
  return tokens.some(token =>
    token !== ignoreToken &&
    Math.abs(token.position.x - cell.position.x) < 0.01 &&
    Math.abs(token.position.z - cell.position.z) < 0.01
  );
}

function updateMouseAndRay(event) {
  const rect = renderer.domElement.getBoundingClientRect();

  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
}

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

function setTokenSelected(token, isSelected) {
  token.traverse((child) => {
    if (child.isMesh && child.material && child.material.emissive) {
      child.material.emissive.setHex(isSelected ? 0x333333 : 0x000000);
    }
  });
}

// создание фишки
function createToken(x, z) {
  const group = new THREE.Group();
  group.userData.isToken = true;

  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.5, 0.2, 16),
    new THREE.MeshStandardMaterial({ color: 0xdddddd })
  );

  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 0.6, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  body.position.y = 0.4;

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  head.position.y = 0.8;

  group.add(base, body, head);
group.position.set(x, 0.51, z);

enableLayerRecursive(group, LAYER_TOKEN);

scene.add(group);
tokens.push(group);

group.updateMatrixWorld(true);
}

// =====================
// ДОБАВЛЕНИЕ ФИШКИ
// =====================
document.getElementById("addToken").onclick = () => {
  const freeCells = gridCells.filter(cell => !isCellOccupied(cell));

  if (freeCells.length === 0) return;

  const cell = freeCells[Math.floor(Math.random() * freeCells.length)];
  createToken(cell.position.x, cell.position.z);
};

// =====================
// RAYCAST
// =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getTokenRoot(object) {
  let obj = object;

  while (obj) {
    if (obj.userData && obj.userData.isToken) return obj;
    obj = obj.parent;
  }

  return null;
}

renderer.domElement.addEventListener("pointermove", (e) => {
  if (!selected) return;

  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

  selected.position.x = cell.position.x;
  selected.position.z = cell.position.z;
});

renderer.domElement.addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return;

  e.preventDefault();
  updateMouseAndRay(e);
  scene.updateMatrixWorld(true);

  // 1. Выбор фишки
  if (!selected) {
    raycaster.layers.set(LAYER_TOKEN);
    const tokenHits = raycaster.intersectObjects(tokens, true);

    console.log("tokenHits:", tokenHits.length, tokenHits[0]?.object);

    if (tokenHits.length > 0) {
      const token = getTokenRoot(tokenHits[0].object);

      if (token) {
        selected = token;
        setTokenSelected(selected, true);
        selected.position.y = 0.7; // чуть приподнимаем для наглядности
        controls.enabled = false;
      }
    }

    return;
  }

  // 2. Постановка на клетку
  raycaster.layers.set(LAYER_GRID);
  const gridHits = raycaster.intersectObjects(gridCells, false);

  console.log("gridHits:", gridHits.length, gridHits[0]?.object);

  if (gridHits.length === 0) return;

  const cell = gridHits[0].object;

  if (isCellOccupied(cell, selected)) return;

  selected.position.x = cell.position.x;
  selected.position.y = 0.51;
  selected.position.z = cell.position.z;

  setTokenSelected(selected, false);
  selected = null;
  controls.enabled = true;
});

// =====================
// АНИМАЦИЯ
// =====================
function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  // движение облаков:
  // корабль как будто летит вперед (в сторону -Z),
  // поэтому облака медленно уходят назад (+Z)
  for (const cloud of clouds) {
    cloud.position.z += cloud.userData.speed;
    cloud.rotation.y += cloud.userData.spin;

    if (cloud.position.z > 90) {
      resetCloud(cloud, true);
    }
  }

  // ветер летит быстрее облаков
  for (const streak of windStreaks) {
    streak.position.z += streak.userData.speed;

    if (streak.position.z > 30) {
      resetWindStreak(streak, true);
    }
  }

  renderer.render(scene, camera);
}
animate();

// =====================
// RESIZE
// =====================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
