<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>DND Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>DND Manager</h1>

<div class="tabs">
  <button onclick="showTab('characters')">Персонажи</button>
  <button onclick="showTab('combat')">Бой</button>
  <button onclick="showTab('scene')">Сцена</button>
</div>

<!-- ПЕРСОНАЖИ -->
<div id="characters" class="tab">
  <h2>Персонажи</h2>

  <input type="file" id="fileInput">

  <div id="characterList"></div>
  <div id="characterView"></div>
</div>

<!-- БОЙ -->
<div id="combat" class="tab" style="display:none;">
  <h2>Бой</h2>

  <button onclick="addCombatRow()">+ Добавить</button>

  <table id="combatTable">
    <thead>
      <tr>
        <th></th>
        <th>Имя</th>
        <th>Инициатива</th>
        <th>Хиты</th>
        <th>КЗ</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="scene" class="tab" style="display:none;">
  <iframe src="scene.html" width="100%" height="800px"></iframe>
</div>
  
<script src="script.js"></script>
</body>
</html>
